name: BUILD AND TEST

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'

      - name: Install Ionic & Cordova
        run: npm install -g @ionic/cli cordova@10

      - name: Clean project
        run: rm -rf node_modules platforms plugins

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        
      - name: Remove global cordova
        run: sudo npm uninstall -g cordova || true

      - name: Install Ionic & Cordova
        run: npm install -g @ionic/cli@6 cordova@10

      - name: Debug versions
        run: |
          which cordova
          cordova -v
          node -v
        

      - run: cp ./src/environments/environment.ts.example ./src/environments/environment.ts
      - run: cp ./src/environments/environment.ts.example ./src/environments/environment.dev.ts
      - run: cp ./src/environments/environment.ts.example ./src/environments/environment.prod.ts

      - run: ionic cordova resources android
      - run: ionic cordova platform add android
      - run: ionic cordova build android --no-interactive --confirm

      - name: Archive build
        uses: actions/upload-artifact@v4
        with:
          name: andes-app
          path: ./platforms/android/app/build/outputs