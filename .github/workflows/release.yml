name: RELEASE

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'

      # 🔥 Limpieza (consistencia)
      - name: Clean project
        run: rm -rf node_modules platforms plugins

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # 🔎 Debug opcional (recomendado al principio)
      - name: Debug versions
        run: |
          node -v
          npm -v

      # 🚀 Release
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: npx semantic-release