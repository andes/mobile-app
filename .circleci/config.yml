version: 2.1

jobs:
  build:
    docker:
      - image: circleci/node:16

    steps:
      - checkout

      # 🔹 Cache solo de node_modules (correcto)
      - restore_cache:
          key: dependency-cache-{{ checksum "package.json" }}

      - run:
          name: Clean npm cache
          command: npm cache clean --force

      # 🔥 Limpieza completa (CLAVE)
      - run:
          name: Clean project
          command: rm -rf node_modules platforms plugins

      - run:
          name: Install dependencies
          command: npm install --legacy-peer-deps

      - save_cache:
          key: dependency-cache-{{ checksum "package.json" }}
          paths:
            - ./node_modules

      # 🔹 Environments
      - run:
          name: Copy environment
          command: cp ./src/environments/environment.ts.example ./src/environments/environment.ts

      - run:
          name: Copy environment dev
          command: cp ./src/environments/environment.ts.example ./src/environments/environment.dev.ts

      - run:
          name: Copy environment prod
          command: cp ./src/environments/environment.ts.example ./src/environments/environment.prod.ts

      # 🔹 Google services
      - run:
          name: Google services
          command: echo $GOOGLE_SERVICES | base64 --decode > google-services.json

      # 🔹 Lint
      - run:
          name: lint
          command: npm run lint

      - run:
          name: Install Cordova locally
          command: npm install cordova@10 --save-dev

      # 🔥 Agregar platform correctamente
      - run:
          name: Add browser platform
          command: npx ionic cordova platform add browser

      # 🔥 Build limpio
      - run:
          name: Build browser
          command: npx ionic cordova build browser --prod --no-interactive --confirm

      # 🔹 Cache liviano (opcional)
      - save_cache:
          key: build-cache-{{ checksum "config.xml" }}
          paths:
            - ./www