<ion-header class="dark" translucent="true">
    <ion-toolbar>
        <ion-back-button slot="start" defaultHref="home" text=""></ion-back-button>
        <ion-buttons slot="end">
            <ion-menu-button></ion-menu-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content class="dark ion-padding-horizontal">
    <div *ngIf="loading" class="no-item">
        <ads-icon icon="ball-triangle"></ads-icon>
    </div>
    <ng-container *ngIf="!loading">
        <!-- Mensaje bienvenida -->
        <section class="cabecera login ion-flex ion-justify-content-between ion-align-items-center">
            <div class="title-container">
                <h2 class="welcome-title" *ngIf="!authService.user">
                    Ingreso Profesional
                </h2>
            </div>
        </section>
        <section class="input-container">
            <div>
                <input class="md rounded block outline" placeholder="Usuario de ANDES" [(ngModel)]="documento"
                       type="number" autocapitalize="none" (keypress)="onKeyPress($event, 'password')" />
            </div>
            <div>
                <input class="md rounded block outline" placeholder="Clave de ANDES" id="password"
                       [(ngModel)]="password" type="password" (keypress)="onKeyPress($event, 'submit')" />
            </div>
            <ion-row class="ion-justify-content-center">
                <button class="md rounded block" [disabled]="!documento || !password"
                        [class.success]="(documento && password) && !loading" [class.disabled]="!documento || !password"
                        (click)="login()">
                    Ingresar
                </button>

                <ng-container *ngIf="biometricAvailable">
                    <!-- Botón Inteligente: Ingresar con Huella o Activar -->
                    <button *ngIf="biometricActive" class="md rounded block success btn-biometric" (click)="loginBiometrico()">
                        Ingresar con datos biométricos
                    </button>

                    <!-- Solo mostramos 'Activar' si ya tiene credenciales guardadas de antes (es decir, ya se logueó una vez) -->
                    <button *ngIf="!biometricActive && hasCredentials" class="btn-block-outline" (click)="alternarBiometria()">
                        Activar datos biométricos
                    </button>

                    <!-- Opción secundaria para desactivar (solo si está activo) -->
                    <ion-row *ngIf="biometricActive" class="ion-justify-content-center" style="margin-top: 7px;">
                        <a class="link-pass" (click)="alternarBiometria()" style="font-size: 0.9rem; text-decoration: underline;">
                            Desactivar datos biométricos
                        </a>
                    </ion-row>
                </ng-container>
            </ion-row>
            <ion-row class="ion-justify-content-center ion-wrap margin-top-40">
                <a class="link-pass block" routerLink="/login/recuperar-password-profesional">
                    Olvidé mi contraseña
                </a>
            </ion-row>
            <ion-row>&nbsp;</ion-row>
        </section>
    </ng-container>
</ion-content>
