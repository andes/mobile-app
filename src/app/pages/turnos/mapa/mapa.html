<ion-content>
    <google-map *ngIf="centro" width="100%" height="100%" [center]="{
            lat: centro.location.latitud,
            lng: centro.location.longitud
        }" [zoom]="zoom">

        <map-marker #marker="mapMarker" [position]="{
                lat: centro.location.latitud,
                lng: centro.location.longitud
            }" [options]="{
                icon: 'assets/icon/hospital-location.png'
            }" (mapClick)="infoWindow.open(marker)">

            <map-info-window #infoWindow>
                <div class="infowindow">
                    <div class="title">
                        {{ centro.nombre }}
                    </div>
                    <div class="direccion">
                        <strong>Dirección:</strong> {{ centro.domicilio.direccion }}
                        <button class="outline circular success action-navigate" (click)="navigateTo()">
                            <ion-icon name="navigate"></ion-icon>
                        </button>
                    </div>
                </div>
            </map-info-window>
        </map-marker>
    </google-map>
</ion-content>
